<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Traffic Dash - 塞車衝衝衝</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <main class="game-shell" aria-label="Traffic Dash game">
    <section class="top-bar" aria-label="Game status">
      <div class="brand">
        <span class="brand__title">Traffic Dash</span>
        <span class="brand__subtitle">塞車衝衝衝</span>
      </div>

      <div class="hud" aria-live="polite">
        <div class="hud__item">
          <span class="hud__label">Distance</span>
          <strong id="distanceValue">0.00 mi</strong>
        </div>
        <div class="hud__item">
          <span class="hud__label">Speed</span>
          <strong id="speedValue">1</strong>
        </div>
        <div class="hud__item">
          <span class="hud__label">Patience</span>
          <strong id="patienceValue">100</strong>
        </div>
        <div class="hud__item hud__status">
          <span class="hud__label">Status</span>
          <strong id="statusValue">Road trip begins</strong>
        </div>
      </div>

      <div class="menu-actions">
        <button id="muteButton" class="icon-button" type="button" aria-pressed="false" aria-label="Mute sound">🔊</button>
        <button id="restartButton" class="text-button" type="button">Restart</button>
      </div>
    </section>

    <section class="canvas-wrap">
      <canvas id="gameCanvas" width="540" height="960" aria-label="Cartoon highway game canvas"></canvas>

      <div id="gameOverlay" class="overlay overlay--hidden" role="dialog" aria-modal="true" aria-labelledby="overlayTitle">
        <div class="overlay__panel">
          <p id="overlayBadge" class="overlay__badge">Road Trip</p>
          <h1 id="overlayTitle">Traffic Dash</h1>
          <p id="overlayText">Reach 10 miles before your patience runs out.</p>
          <button id="overlayRestartButton" class="primary-button" type="button">Play Again</button>
        </div>
      </div>
    </section>

    <section class="touch-controls" aria-label="Touch controls">
      <button class="touch-button" type="button" data-action="left" aria-label="Move left">⬅️</button>
      <button class="touch-button touch-button--slow" type="button" data-action="slow" aria-label="Slow down">🐢 Slow</button>
      <button class="touch-button touch-button--fast" type="button" data-action="fast" aria-label="Speed up">⚡ Fast</button>
      <button class="touch-button" type="button" data-action="right" aria-label="Move right">➡️</button>
    </section>
  </main>

  <script src="./state.js"></script>
  <script src="./controls.js"></script>
  <script src="./render.js"></script>
  <script src="./main.js"></script>
</body>
</html>
